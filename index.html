<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paniekpoppetje</title>
  <style>
    body {
      margin: 0;
      background-color: #2f405c;
      font-family: 'Segoe UI', sans-serif;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .image-container {
      position: relative;
      display: inline-block;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1792 / 2400;
      width: 90vw;
      max-width: 600px; /* Reduced for better focus */
    }

    /* Inner overlay for the vignette effect and side masking */
    .image-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(to right, #2f405c 0%, transparent 25%, transparent 75%, #2f405c 100%),
        linear-gradient(to bottom, #2f405c 0%, transparent 25%, transparent 75%, #2f405c 100%);
      z-index: 2;
      pointer-events: none;
    }

    .image-container video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .caption {
      margin-top: 1rem;
      font-size: 1.25rem;
      font-weight: 500;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <video autoplay muted loop playsinline poster="Heimdallr.webp">
      <source src="Heimdallr.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
